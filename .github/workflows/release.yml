name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            # First release — use all commits
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}")
          fi

          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
